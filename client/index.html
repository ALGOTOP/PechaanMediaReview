<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Primary SEO -->
    <title>Pehchaan Media — Full-Service Creative Agency</title>
    <meta name="description" content="Pehchaan Media is a full-service creative agency crafting unforgettable brand stories through design, film, web, and strategy. Transform your business into a beloved brand." />
    <meta name="keywords" content="creative agency, brand identity, film production, web design, digital marketing, Pehchaan Media" />
    <meta name="author" content="Pehchaan Media" />
    <link rel="canonical" href="https://pnmh.site/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, Snapchat, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pehchaan Media" />
    <meta property="og:title" content="Pehchaan Media — Full-Service Creative Agency" />
    <meta property="og:description" content="We make brands unforgettable. Award-worthy creative work in brand identity, film, web, and strategy." />
    <meta property="og:url" content="https://pnmh.site/" />
    <meta property="og:image" content="https://pnmh.site/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Pehchaan Media — Creative Agency" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pehchaan Media — Full-Service Creative Agency" />
    <meta name="twitter:description" content="We make brands unforgettable. Award-worthy creative work in brand identity, film, web, and strategy." />
    <meta name="twitter:image" content="https://pnmh.site/og-image.jpg" />
    <meta name="twitter:image:alt" content="Pehchaan Media — Creative Agency" />

    <!-- In-app browser compatibility -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#111111" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Pehchaan Media",
      "url": "https://pnmh.site",
      "logo": "https://pnmh.site/favicon.png",
      "description": "Full-service creative agency crafting unforgettable brand stories through design, film, web, and strategy.",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+92-335-5312242",
        "contactType": "customer service",
        "email": "infopehchaanmedia@gmail.com"
      },
      "sameAs": [
        "https://www.instagram.com/pehchaanmedia",
        "https://www.tiktok.com/@pehchaanmedia"
      ]
    }
    </script>

    <!-- Fonts from Google CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
